version: "3.9"

services:
  reservation-service:
    build:
      context: ./ReservationService
      dockerfile: Dockerfile
    container_name: reservation-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

      - ConnectionStrings__DefaultConnection=Server=devops-sql,1433;Database=ReservationServiceDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True
      - Services__Accommodation__BaseUrl=http://accommodation-service:8080

    networks:
      - shared-net
    ports:
      - "5004:8080"

networks:
  shared-net:
    external: true
    name: shared-net
